<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PRADARSH">
<meta name="theme-color" content="#0d1b3e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>PRADARSH</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0d1b3e;--teal:#0f6e56;--gold:#c8a84b;--red:#c62828;--orange:#e65100;--green:#1b5e20;--gray:#f2f2f7;--lgray:#e5e5ea;--dgray:#1c1c1e;--mgray:#6c6c70;--lgreen:#e8f5e9;--lorange:#fff3e0;--lnavy:#e8eaf6}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--gray);color:var(--dgray)}
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--navy);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
#logo-img{width:38px;height:38px;border-radius:9px;overflow:hidden;background:white;padding:2px;flex-shrink:0}
#logo-img img{width:100%;height:100%;object-fit:contain;display:block}
#topbar-txt{flex:1}
#topbar-name{font-size:15px;font-weight:800;letter-spacing:1px;color:#fff}
#topbar-sub{font-size:10px;color:rgba(255,255,255,0.6);margin-top:1px}
#new-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
#tabs-bar{background:#fff;border-bottom:1px solid var(--lgray);overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;scrollbar-width:none;position:sticky;top:58px;z-index:99}
#tabs-bar::-webkit-scrollbar{display:none}
.t{padding:10px 12px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;color:var(--mgray);border-bottom:2.5px solid transparent;flex-shrink:0}
.t.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
.t.ok{color:var(--teal);border-bottom-color:var(--teal)}
#body{padding:12px 12px 90px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.ctitle{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.oh{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--lgray)}
.oi{width:34px;height:34px;border-radius:9px;background:var(--lnavy);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.olb{font-size:14px;font-weight:700;color:var(--navy)}
.osb{font-size:11px;color:var(--mgray);margin-top:1px}
.vrow{display:flex;gap:6px;flex-shrink:0}
.vb{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--teal);background:transparent;color:var(--teal)}
.vb.on{background:var(--teal);color:#fff}
.nb{border-color:var(--red);color:var(--red)}
.nb.on{background:var(--red);color:#fff}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.f{display:flex;flex-direction:column;gap:3px}
.f.full{grid-column:1/-1}
.f label{font-size:11px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
.f select,.f input,.f textarea{font-size:14px;padding:9px 10px;border-radius:10px;border:1px solid var(--lgray);background:var(--gray);color:var(--dgray);width:100%;-webkit-appearance:none}
.f select:focus,.f input:focus{outline:none;border-color:var(--teal);background:#fff}
.hint{font-size:10px;color:var(--mgray);margin-top:1px}
.brow{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--lgray)}
.btn{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.bs{background:var(--lgray);color:var(--dgray)}
.bp{background:var(--teal);color:#fff}
.nv-msg{text-align:center;padding:20px;color:var(--mgray);font-size:13px;background:var(--lgray);border-radius:10px;margin-bottom:10px}
#gen-btn{position:fixed;bottom:14px;left:14px;right:14px;z-index:200;background:var(--navy);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(13,27,62,.4)}
#rep-bar{background:var(--navy);padding:10px 14px;display:none;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.rb{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.rb2{background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
#report{display:none}
.rp{background:#fff;margin:10px;border-radius:14px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,.1)}
.lh{border-bottom:3px double var(--navy);padding-bottom:10px;margin-bottom:12px;text-align:center}
.lh-t{font-size:16px;font-weight:800;color:var(--navy);text-transform:uppercase}
.lh-s{font-size:12px;color:var(--navy);font-weight:600;margin-top:2px}
.lh-a{font-size:11px;color:var(--mgray);margin-top:2px}
.lh-ln{height:2px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--teal));border-radius:2px;margin:7px 0 4px}
.pb{border:1.5px solid var(--navy);border-radius:8px;margin-bottom:12px;overflow:hidden}
.pbt{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;text-transform:uppercase}
.pg{display:grid;grid-template-columns:1fr 1fr}
.pr{display:flex;border-bottom:.5px solid var(--lgray)}
.pr:last-child{border-bottom:none}
.pl{font-size:10px;font-weight:700;color:var(--navy);padding:5px 8px;min-width:90px;border-right:.5px solid var(--lgray);background:var(--lnavy);text-transform:uppercase}
.pv{font-size:11px;color:var(--dgray);padding:5px 8px;flex:1}
.sb{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding:4px 0;border-bottom:2px solid var(--navy)}
.do{display:flex;gap:0;margin-bottom:7px;font-size:12px;line-height:1.7;padding-bottom:7px;border-bottom:.5px solid var(--lgray)}
.do:last-child{border-bottom:none;margin-bottom:0}
.dl{font-weight:700;color:var(--navy);min-width:130px;flex-shrink:0}
.dt{color:var(--dgray);flex:1}
.ib{border:2px solid var(--navy);border-radius:8px;margin-bottom:10px;overflow:hidden}
.it{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.ibody{padding:10px;font-size:12px;color:var(--dgray);line-height:1.7;min-height:50px}
.ai-btn{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.rcb{border:2px solid var(--teal);border-radius:8px;margin-bottom:12px;overflow:hidden}
.rct{background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;text-transform:uppercase}
.rcbody{padding:10px;font-size:12px;color:var(--dgray);min-height:40px}
.dchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.dc{background:var(--lorange);border:1px solid #f0c080;border-radius:5px;padding:2px 8px;font-size:10px;color:var(--orange);font-weight:500}
.ss{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:2px solid var(--navy)}
.sbl{text-align:center}
.sll{border-bottom:1px solid var(--dgray);width:130px;margin-bottom:4px}
.slb{font-size:10px;color:var(--mgray)}
.snm{font-size:11px;font-weight:700;color:var(--navy);margin-top:2px}
.rf{text-align:center;font-size:9px;color:var(--mgray);margin-top:12px;padding-top:8px;border-top:.5px solid var(--lgray)}
@media print{#app,#rep-bar,#gen-btn{display:none!important}#report{display:block!important;padding:0}.rp{margin:0;border-radius:0;box-shadow:none}@page{size:A4;margin:10mm}}
</style>
</head>

  {id:"gas",lb:"Free Peritoneal Gas",t:"s",op:["Absent","Present — reverberation artefact","Present — GI perforation suspected","Present — post-surgical (expected)"]},
  {id:"sq",lb:"Study Quality",t:"s",op:["Diagnostic — complete","Diagnostic — adequate","Limited — gas obscuring","Limited — patient cooperation","Limited — body condition / fat","Non-diagnostic"]},
  {id:"rem",lb:"Remarks",t:"txt",ph:"Specific location of fluid, echogenicity, any visible cause..."},
]}
];
const NV=new Set(["Normal","None","Absent","NA","Not visualised","Normal bilaterally","Well distended",
 "Normal peristalsis","Normal — 5 layers preserved","Normal — not enlarged","Not dilated",
 "Clear — anechoic urine","Adequate — both limbs","Normal — bilobed peanut / dumbbell",
 "Normal — uniform hypoechoic","Diagnostic — complete","Diagnostic — adequate",
 "Normal — homogeneous hypoechoic","Normal — isoechoic to mesenteric fat","Normal — distinct CMD",
 "Normal — < liver < spleen","Not visualised — normal (small)","Normal — small homogeneous",
 "Normal — thin anechoic / not visible","Normal — bilobed symmetric","Normal — mildly heterogeneous",
 "Normal faecal material","Normal — homogeneous fine texture","Smooth","Normal — isoechoic to spleen",
 "Anechoic — normal bile","Not visualised / not dilated","Anechoic — pure transudate",
 "Normal fasted","Normal","Absent","None","NA","Not identified"]);

var isN=function(v){return !v||NV.has(v)||v.indexOf("Normal")===0||v==="None"||v==="NA"||v==="Absent"||v.indexOf("Not vis")===0||v==="Not dilated"||v==="Adequate";};
var cur=0,D={};
for(var _i=0;_i<OR.length;_i++){D[OR[_i].id]={};}

function tabs(){
  var h="";
  for(var i=0;i<OR.length;i++){
    var o=OR[i];
    var c="t"+(i===cur?" on":"")+(D[o.id]._done?" ok":"");
    h+='<div class="'+c+'" onclick="go('+i+')">'+o.ic+" "+o.lb+(D[o.id]._done?" ✓":"")+"</div>";
  }
  document.getElementById("tabs-bar").innerHTML=h;
  setTimeout(function(){var el=document.querySelectorAll(".t")[cur];if(el)el.scrollIntoView({inline:"center",behavior:"smooth"});},50);
}

function save(){
  var o=OR[cur];
  for(var i=0;i<o.ps.length;i++){
    var el=document.getElementById("f"+o.id+o.ps[i].id);
    if(el) D[o.id][o.ps[i].id]=el.value;
  }
}

function go(i){save();cur=i;tabs();render();}

function done(){save();D[OR[cur].id]._done=true;if(cur<OR.length-1)cur++;tabs();render();document.getElementById("body").scrollTop=0;}

function clr(){D[OR[cur].id]={};render();}

function viz(v){save();D[OR[cur].id]._viz=v;render();}
function vizV(){viz("Visualised");}
function vizN(){viz("Not Visualised");}

function render(){
  var o=OR[cur];
  var sv=D[o.id]||{};
  var nv=sv._viz==="Not Visualised";
  var h='<div class="card"><div class="oh">';
  h+='<div class="oi">'+o.ic+"</div>";
  h+='<div style="flex:1"><div class="olb">'+o.lb+"</div>";
  h+='<div class="osb">Tap fields to record findings</div></div>';
  h+='<div class="vrow">';
  h+='<button class="vb'+(nv?"":"\ on")+'" onclick="vizV()">Vis</button>';
  h+='<button class="vb nb'+(nv?"\ on":"")+'" onclick="vizN()">NV</button>';
  h+="</div></div>";
  if(nv){
    h+='<div class="nv-msg">Not Visualised &mdash; organ not assessable</div>';
  } else {
    h+='<div class="fg">';
    for(var i=0;i<o.ps.length;i++) h+=field(o.id,o.ps[i],sv);
    h+="</div>";
  }
  h+='<div class="brow">';
  if(cur>0) h+='<button class="btn bs" onclick="go('+(cur-1)+')">Back</button>';
  h+='<button class="btn bs" onclick="clr()">Clear</button>';
  h+='<button class="btn bp" onclick="done()">Save &amp; Next</button>';
  h+="</div></div>";
  document.getElementById("opanel").innerHTML=h;
}

function field(oid,p,sv){
  var v=sv[p.id]||"";
  if(p.t==="txt") return '<div class="f full"><label>'+p.lb+'</label><textarea id="f'+oid+p.id+'" rows="2" placeholder="'+(p.ph||"")+'">'+v+"</textarea></div>";
  if(p.t==="n") return '<div class="f"><label>'+p.lb+'</label><input type="number" step="0.1" inputmode="decimal" id="f'+oid+p.id+'" placeholder="'+(p.ph||"")+'" value="'+v+'"><div class="hint">'+(p.ht||"")+"</div></div>";
  var ops="";
  for(var i=0;i<p.op.length;i++) ops+="<option"+(v===p.op[i]?" selected":"")+">"+p.op[i]+"</option>";
  return '<div class="f"><label>'+p.lb+'</label><select id="f'+oid+p.id+'">'+ops+"</select>"+(p.ht?'<div class="hint">'+p.ht+"</div>":"")+"</div>";
}

function g(id){var el=document.getElementById(id);return el?el.value||"":""}

function genReport(){
  save();
  var name=g("pt-name"),sp=g("pt-sp"),breed=g("pt-breed"),age=g("pt-age"),
      wt=g("pt-wt"),owner=g("pt-owner"),contact=g("pt-contact"),ref=g("pt-ref"),
      complaint=g("pt-complaint"),fast=g("pt-fast"),sed=g("pt-sed"),
      mach=g("pt-mach"),probe=g("pt-probe"),caseNo=g("pt-case"),date=g("pt-date");

  var logoSrc=document.getElementById("logo-img").querySelector("img").src;
  var h='<div class="rp">';
  h+='<div class="lh">';
  h+='<img src="'+logoSrc+'" style="width:90px;height:90px;object-fit:contain;display:block;margin:0 auto 8px" alt="logo">';
  h+='<div class="lh-t">Abdominal Ultrasound Report</div>';
  h+='<div class="lh-s">Dr. K.S. Saikrishna M.V.Sc, Ph.D.</div>';
  h+='<div class="lh-a">Assistant Professor &amp; Head, Department of Veterinary Medicine</div>';
  h+='<div class="lh-a">College of Veterinary Science, Proddatur &mdash; SVVU, Andhra Pradesh</div>';
  h+='<div class="lh-ln"></div></div>';

  h+='<div class="pb"><div class="pbt">Patient &amp; Examination Details</div><div class="pg">';
  var pf=[["Case No.",caseNo],["Date",date],["Patient",name],["Species/Breed",sp+" / "+breed],
          ["Age/Sex",age],["Body Wt.",wt+" kg"],["Owner",owner],["Contact",contact],
          ["Ref.Clinician",ref],["Indication",complaint],["Machine/Probe",mach+" / "+probe],
          ["Fasting/Sed.",fast+" / "+sed]];
  for(var i=0;i<pf.length;i++){
    h+='<div class="pr"><div class="pl">'+pf[i][0]+'</div><div class="pv">'+pf[i][1]+"</div></div>";
  }
  h+='</div></div>';
  h+='<p style="font-size:11px;color:var(--mgray);margin-bottom:12px;font-style:italic">A complete abdominal ultrasound examination was performed on '+date+'.</p>';

  h+='<div class="sb">Findings</div><div style="margin-bottom:14px">';
  var allD=[],conc=[],cNum=1,hasAbn=false;
  for(var oi=0;oi<OR.length;oi++){
    var organ=OR[oi];
    var d=D[organ.id]||{};
    var vz=d._viz||"Visualised";
    if(vz==="Not Visualised"){
      h+='<div class="do"><div class="dl">'+organ.lb+':</div><div class="dt"><em>Not visualised on this examination.</em></div></div>';
      continue;
    }
    var hasData=false;
    for(var pi=0;pi<organ.ps.length;pi++){if(d[organ.ps[pi].id]&&organ.ps[pi].id!=="id"){hasData=true;break;}}
    if(!hasData) continue;
    var parts=[],nums=[],remarks="",diffs=[];
    for(var pi=0;pi<organ.ps.length;pi++){
      var p=organ.ps[pi];var v=d[p.id];
      if(!v||p.id==="_viz") continue;
      if(p.t==="txt"){if(v.trim())remarks=v;continue;}
      var abn=!isN(v);
      if(abn) hasAbn=true;
      var unit=(p.t==="n"&&p.ph&&(p.ph==="cm"||p.ph==="mm"))?" "+p.ph:"";
      if(p.t==="n") nums.push(p.lb.toLowerCase()+" measuring "+v+unit);
      else if(abn){
        parts.push(v);
        if(p.df&&p.df[v]){
          var dd=p.df[v].slice(0,3);
          for(var di=0;di<dd.length;di++){diffs.push(dd[di]);allD.push(dd[di]);}
          conc.push({n:cNum++,org:organ.lb,find:v,diffs:dd});
        }
      }
    }
    var nar="";
    if(!parts.length&&!nums.length&&!remarks){nar="Unremarkable.";}
    else{
      if(parts.length) nar+=parts.join(". ")+". ";
      if(nums.length) nar+=(parts.length?"":"Normal; ")+nums.join(". ")+". ";
      if(remarks) nar+=remarks;
      nar=nar.trim();
    }
    h+='<div class="do"><div class="dl">'+organ.lb+':</div><div class="dt">'+nar+"</div></div>";
  }
  h+="</div>";

  if(allD.length){
    var uD=[];
    for(var i=0;i<allD.length;i++){if(uD.indexOf(allD[i])===-1&&uD.length<15)uD.push(allD[i]);}
    h+='<div class="sb" style="border-color:var(--orange);color:var(--orange)">Differentials</div>';
    h+='<div class="dchips">';
    for(var i=0;i<uD.length;i++) h+='<span class="dc">'+uD[i]+"</span>";
    h+="</div>";
  }

  h+='<div class="ib"><div class="it"><span>Conclusions</span>';
  h+='<button class="ai-btn" onclick="genAI()">AI Generate</button></div>';
  h+='<div class="ibody" id="imp-body">';
  if(conc.length){
    h+="<ol style='padding-left:18px;margin:0'>";
    for(var i=0;i<conc.length;i++){
      var c=conc[i];
      var dd=c.diffs.length?" Differentials include "+c.diffs.join(" versus ")+".":"";
      h+="<li style='margin-bottom:6px;line-height:1.7'><b>"+c.org+":</b> "+c.find+"."+dd+"</li>";
    }
    h+="</ol>";
  } else {
    h+=hasAbn?"Ultrasonographic examination reveals abnormal findings detailed above. Clinical correlation with haematology, biochemistry, and histopathology recommended.":"No significant ultrasonographic abnormalities detected. All visualised organs appear within normal limits.";
  }
  h+="</div></div>";

  h+='<div class="rcb"><div class="rct">Recommendations / Follow-up</div><div class="rcbody" style="min-height:40px"></div></div>';

  h+='<div class="ss">';
  h+='<div class="sbl"><div class="sll"></div><div class="slb">Sonographer</div></div>';
  h+='<div class="sbl"><div class="sll"></div><div class="slb">Reporting Clinician</div><div class="snm">Dr. K.S. Saikrishna M.V.Sc, Ph.D.</div><div style="font-size:9px;color:var(--mgray)">Dept. of Vet. Medicine &middot; CVSc Proddatur &middot; SVVU</div></div>';
  h+='<div class="sbl"><div class="sll"></div><div class="slb">Date &amp; Time</div></div>';
  h+="</div>";
  h+='<div class="rf">PRADARSH &middot; AI-Powered Veterinary USG Reporting &middot; Ref: Mattoon &amp; Nyland, Small Animal Diagnostic Ultrasound 3e (Saunders 2015)</div>';
  h+="</div>";

  document.getElementById("report").innerHTML=h;
  document.getElementById("app").style.display="none";
  document.getElementById("rep-bar").style.display="flex";
  document.getElementById("report").style.display="block";
  window.scrollTo(0,0);
}

function backForm(){
  document.getElementById("report").style.display="none";
  document.getElementById("rep-bar").style.display="none";
  document.getElementById("app").style.display="flex";
}

function resetAll(){
  for(var i=0;i<OR.length;i++){D[OR[i].id]={};}
  cur=0;
  var ids=["pt-name","pt-breed","pt-age","pt-owner","pt-contact","pt-ref","pt-mach","pt-probe","pt-case","pt-complaint","pt-wt"];
  for(var i=0;i<ids.length;i++){var el=document.getElementById(ids[i]);if(el)el.value="";}
  document.getElementById("pt-date").valueAsDate=new Date();
  tabs();render();
}

async function genAI(){
  var btn=document.querySelector(".ai-btn");
  var box=document.getElementById("imp-body");
  if(!btn||!box)return;
  btn.textContent="Generating...";btn.disabled=true;
  box.innerHTML="<em style='color:var(--mgray)'>Generating clinical conclusions...</em>";
  var fnd=[];
  for(var oi=0;oi<OR.length;oi++){
    var organ=OR[oi];var d=D[organ.id]||{};
    var vz=d._viz||"Visualised";
    if(vz==="Not Visualised"){fnd.push(organ.lb+": Not visualised");continue;}
    for(var pi=0;pi<organ.ps.length;pi++){
      var p=organ.ps[pi];var v=d[p.id];
      if(!v||p.t==="txt"||p.id==="_viz")continue;
      if(!isN(v))fnd.push(organ.lb+" - "+p.lb+": "+v);
    }
  }
  var sp=document.getElementById("pt-sp").value||"Canine";
  var breed=document.getElementById("pt-breed").value||"";
  var age=document.getElementById("pt-age").value||"";
  var prompt="You are a veterinary radiologist (DACVR style). Write 3-5 numbered conclusions for a "+sp+(breed?" ("+breed+")":"")+(age?", "+age:"")+".\n\nFindings:\n"+(fnd.length?fnd.join("\n"):"No significant abnormalities.")+"\n\nEach conclusion: key finding, most likely diagnosis, brief differentials. Concise and clinical.";
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,messages:[{role:"user",content:prompt}]})});
    var data=await res.json();
    var txt=data.content&&data.content[0]?data.content[0].text:"Unable to generate.";
    box.innerHTML="<div style='white-space:pre-line;line-height:1.8;font-size:12px'>"+txt+"</div><div style='font-size:9px;color:var(--mgray);margin-top:6px'>AI-generated &middot; Clinical correlation recommended</div>";
    btn.textContent="Regenerate";btn.disabled=false;
  }catch(e){
    box.innerHTML="AI generation failed. Please write conclusions manually.";
    btn.textContent="AI Generate";btn.disabled=false;
  }
}

document.getElementById("pt-date").valueAsDate=new Date();
tabs();
render();
</script>

if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
