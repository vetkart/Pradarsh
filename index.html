<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="VetScan USG">
<meta name="theme-color" content="#0d1b3e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>VetScan USG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0d1b3e;--teal:#0f6e56;--gold:#c8a84b;--red:#c62828;--orange:#e65100;--green:#1b5e20;
  --gray:#f2f2f7;--lgray:#e5e5ea;--dgray:#1c1c1e;--mgray:#6c6c70;
  --lgreen:#e8f5e9;--lorange:#fff3e0;--lnavy:#e8eaf6;--lteal:#e0f2f1}
html,body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--gray);color:var(--dgray)}
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--navy);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
#topbar-ico{width:34px;height:34px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
#topbar-txt{flex:1}
#topbar-name{font-size:14px;font-weight:700;color:#fff}
#topbar-sub{font-size:10px;color:rgba(255,255,255,0.6);margin-top:1px}
.top-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer}
#tabs{background:#fff;border-bottom:1px solid var(--lgray);overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;scrollbar-width:none;position:sticky;top:54px;z-index:99}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 13px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;color:var(--mgray);border-bottom:2.5px solid transparent;flex-shrink:0;transition:all .15s}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
.tab.done{color:var(--teal);border-bottom-color:var(--teal)}
#content{padding:12px 12px 90px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.card-title{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.organ-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--lgray)}
.organ-ico{width:34px;height:34px;border-radius:9px;background:var(--lnavy);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.organ-lbl{font-size:14px;font-weight:700;color:var(--navy)}
.organ-sub{font-size:11px;color:var(--mgray);margin-top:1px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f{display:flex;flex-direction:column;gap:3px}
.f.full{grid-column:1/-1}
.f label{font-size:11px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
.f select,.f input,.f textarea{font-size:14px;padding:10px;border-radius:10px;border:1px solid var(--lgray);background:var(--gray);color:var(--dgray);width:100%;-webkit-appearance:none}
.f select:focus,.f input:focus,.f textarea:focus{outline:none;border-color:var(--teal);background:#fff}
.hint{font-size:10px;color:var(--mgray);margin-top:1px}
.btns{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--lgray)}
.btn{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:transform .1s,opacity .1s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn:active{transform:scale(.97)}
.btn-s{background:var(--lgray);color:var(--dgray)}
.btn-p{background:var(--teal);color:#fff}
#gen{position:fixed;bottom:12px;left:12px;right:12px;z-index:200;background:var(--navy);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(13,27,62,.4);display:flex;align-items:center;justify-content:center;gap:8px}
#gen:active{transform:scale(.98)}
#rep-bar{background:var(--navy);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;display:none}
#report{display:none;padding:0}
.rep-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.rep-btn2{background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.rpage{background:#fff;margin:10px;border-radius:14px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,.1)}
.lhead{border-bottom:3px double var(--navy);padding-bottom:10px;margin-bottom:12px;text-align:center}
.lhead-title{font-size:17px;font-weight:800;color:var(--navy);text-transform:uppercase}
.lhead-sub{font-size:12px;color:var(--navy);font-weight:600;margin-top:2px}
.lhead-addr{font-size:11px;color:var(--mgray);margin-top:2px}
.lhead-line{height:2px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--teal));border-radius:2px;margin:7px 0 4px}
.lhead-rtype{font-size:13px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px}
.pat-box{border:1.5px solid var(--navy);border-radius:8px;margin-bottom:12px;overflow:hidden}
.pat-box-title{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;text-transform:uppercase;letter-spacing:.8px}
.pat-grid{display:grid;grid-template-columns:1fr 1fr}
.pat-row{display:flex;border-bottom:.5px solid var(--lgray)}
.pat-row:last-child{border-bottom:none}
.pat-lbl{font-size:10px;font-weight:700;color:var(--navy);padding:5px 8px;min-width:90px;border-right:.5px solid var(--lgray);background:var(--lnavy);text-transform:uppercase;letter-spacing:.3px}
.pat-val{font-size:11px;color:var(--dgray);padding:5px 8px;flex:1}
.sec-bar{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding:4px 0;border-bottom:2px solid var(--navy)}
.organ-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:11px}
.organ-table th{background:var(--navy);color:#fff;padding:5px 7px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.organ-table td{padding:6px 7px;border:.5px solid var(--lgray);vertical-align:top;line-height:1.6}
.organ-table tr:nth-child(even) td{background:#fafafa}
.organ-name{font-weight:700;color:var(--navy);font-size:11px;white-space:nowrap}
.abn-tag{display:inline-block;background:var(--lorange);border:1px solid #f0c080;border-radius:4px;padding:1px 6px;font-size:10px;color:var(--orange);margin:1px 2px 1px 0;font-weight:600}
.norm-tag{display:inline-block;background:var(--lgreen);border:1px solid #a8dfc2;border-radius:4px;padding:1px 6px;font-size:10px;color:var(--green);margin:1px 0}
.diff-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:11px}
.diff-table th{background:var(--orange);color:#fff;padding:5px 7px;font-size:10px;font-weight:700;text-transform:uppercase}
.diff-table td{padding:5px 7px;border:.5px solid #f0c080;vertical-align:top}
.diff-table tr:nth-child(even) td{background:var(--lorange)}
.imp-box{border:2px solid var(--navy);border-radius:8px;margin-bottom:10px;overflow:hidden}
.imp-title{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;text-transform:uppercase}
.imp-body{padding:10px;font-size:12px;color:var(--dgray);line-height:1.7;min-height:50px}
.rec-box{border:2px solid var(--teal);border-radius:8px;margin-bottom:12px;overflow:hidden}
.rec-title{background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;text-transform:uppercase}
.rec-body{padding:10px;font-size:12px;color:var(--dgray);min-height:40px}
.sig-section{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:2px solid var(--navy)}
.sig-block{text-align:center}
.sig-line{border-bottom:1px solid var(--dgray);width:130px;margin-bottom:4px}
.sig-label{font-size:10px;color:var(--mgray)}
.sig-name{font-size:11px;font-weight:700;color:var(--navy);margin-top:2px}
.rep-footer{text-align:center;font-size:9px;color:var(--mgray);margin-top:12px;padding-top:8px;border-top:.5px solid var(--lgray)}
.lesion-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:10px}
.lesion-table th{background:var(--red);color:#fff;padding:4px 7px;font-size:9px;font-weight:700;text-transform:uppercase}
.lesion-table td{padding:4px 7px;border:.5px solid #ffcccc;vertical-align:top}
.lesion-table tr:nth-child(even) td{background:#fff5f5}
@media print{
  #app{display:none!important}#rep-bar{display:none!important}
  #report{display:block!important;padding:0}
  .rpage{margin:0;border-radius:0;box-shadow:none}
  @page{size:A4;margin:10mm}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-ico">🔬</div>
    <div id="topbar-txt">
      <div id="topbar-name">VetScan USG Report</div>
      <div id="topbar-sub">Abdominal Ultrasonography · Canine &amp; Feline</div>
    </div>
    <button class="top-btn" onclick="resetAll()">New ↺</button>
  </div>
  <div id="tabs"></div>
  <div id="content">
    <div class="card">
      <div class="card-title">Patient &amp; Owner Details</div>
      <div class="fg">
        <div class="f"><label>Case No.</label><input id="pt-case" placeholder="Case number"></div>
        <div class="f"><label>Date</label><input id="pt-date" type="date"></div>
        <div class="f"><label>Patient Name</label><input id="pt-name" placeholder="Patient name"></div>
        <div class="f"><label>Species</label><select id="pt-sp"><option>Canine</option><option>Feline</option></select></div>
        <div class="f"><label>Breed</label><input id="pt-breed" placeholder="Breed"></div>
        <div class="f"><label>Age &amp; Sex</label><input id="pt-age" placeholder="e.g. 5Y / Male"></div>
        <div class="f"><label>Body Wt. (kg)</label><input id="pt-wt" type="number" step="0.1" placeholder="kg"></div>
        <div class="f"><label>Owner Name</label><input id="pt-owner" placeholder="Owner name"></div>
        <div class="f"><label>Contact No.</label><input id="pt-contact" placeholder="Phone"></div>
        <div class="f"><label>Ref. Clinician</label><input id="pt-ref" placeholder="Referring vet"></div>
        <div class="f"><label>Fasting Status</label><select id="pt-fast"><option>Fasted — 12 hrs</option><option>Fasted — 6 hrs</option><option>Not fasted</option><option>Unknown</option></select></div>
        <div class="f"><label>Sedation</label><select id="pt-sed"><option>None — manual restraint</option><option>Acepromazine</option><option>Dexmedetomidine</option><option>Butorphanol</option><option>GA — propofol</option><option>GA — isoflurane</option></select></div>
        <div class="f"><label>Machine</label><input id="pt-mach" placeholder="USG machine model"></div>
        <div class="f"><label>Probe / Freq.</label><input id="pt-probe" placeholder="e.g. 7.5 MHz linear"></div>
        <div class="f full"><label>Presenting Complaint</label><textarea id="pt-complaint" rows="2" placeholder="Main presenting complaint / indication"></textarea></div>
      </div>
    </div>
    <div id="opanel"></div>
  </div>
  <button id="gen" onclick="genReport()">📋 &nbsp;Generate Report</button>
</div>
<div id="rep-bar">
  <button class="rep-btn" onclick="backForm()">← Back</button>
  <div style="flex:1;text-align:center;font-size:13px;font-weight:700;color:#fff">USG Report</div>
  <button class="rep-btn2" onclick="window.print()">🖨 Print</button>
</div>
<div id="report"></div>

<script>
const OR=[
// ─── LIVER ────────────────────────────────────────────────
{id:"liver",lb:"Liver",ic:"🫀",ps:[
  {id:"sz",lb:"Size (vs Costal Arch)",t:"s",op:["Normal","Hepatomegaly — mild","Hepatomegaly — moderate","Hepatomegaly — severe","Microhepatica"],
   df:{"Hepatomegaly — mild":["Reactive hepatopathy","Steroid / glucocorticoid hepatopathy","Early hepatitis","Hepatic lymphoma","Right-sided congestive heart failure"],
       "Hepatomegaly — moderate":["Hepatic lipidosis (cat)","Glycogen storage disease","Vacuolar hepatopathy","Hepatic neoplasia — primary or metastatic","Passive congestion — CHF"],
       "Hepatomegaly — severe":["Diffuse hepatic neoplasia (lymphoma / HSA)","Severe hepatic lipidosis","Hepatic congestion — CHF","Hepatic lobe torsion","Nodular regeneration — cirrhosis"],
       "Microhepatica":["Portosystemic shunt (congenital)","Hepatic cirrhosis / end-stage fibrosis","Chronic active hepatitis","Portal vein hypoplasia"]}},
  {id:"mg",lb:"Margins / Contour",t:"s",op:["Smooth — normal","Irregular — diffuse","Nodular surface","Rounded margins — hepatomegaly","Irregular focal — possible mass"]},
  {id:"ec",lb:"Echogenicity (vs Spleen)",t:"s",op:["Normal — isoechoic to spleen","Hyperechoic — diffuse (>spleen)","Hypoechoic — diffuse (<spleen)","Heterogeneous — mixed"],
   df:{"Hyperechoic — diffuse (>spleen)":["Hepatic lipidosis (cats — most common)","Steroid hepatopathy / vacuolar hepatopathy","Chronic hepatic fibrosis","Diffuse neoplastic infiltration — lymphoma","Hepatic amyloidosis"],
       "Hypoechoic — diffuse (<spleen)":["Acute hepatitis — viral / bacterial / toxic","Hepatic lymphoma (diffuse)","Acute hepatic congestion — right heart failure","Leptospirosis","Histiocytic sarcoma — diffuse"],
       "Heterogeneous — mixed":["Chronic hepatitis / cirrhosis","Multifocal neoplasia","Nodular hyperplasia (old dogs)","Hepatic abscess — multiple","Diffuse mast cell infiltration (cats)"]}},
  {id:"tx",lb:"Echotexture",t:"s",op:["Homogeneous — fine","Coarse / granular","Nodular — multiple","Heterogeneous — diffuse","Heterogeneous — focal"]},
  {id:"pvd",lb:"Portal Vein Diameter",t:"n",ph:"mm",ht:"Dog: 5–13 mm; Cat: 3–8 mm"},
  {id:"hv",lb:"Hepatic Veins / CVC",t:"s",op:["Normal — anechoic tubular","Dilated — right heart failure","Thrombosis — echogenic intraluminal","Reduced flow","Not visualised"]},
  {id:"ms",lb:"Focal Lesion / Mass",t:"s",op:["None","Single hypoechoic nodule < 1 cm","Single hyperechoic nodule < 1 cm","Target lesion (hypoechoic rim)","Single solid mass > 1 cm","Single cavitary / cystic mass","Multiple hypoechoic nodules","Multiple hyperechoic nodules","Multiple target lesions","Diffuse nodularity — entire liver","Mixed echogenic mass"],
   df:{"Single hypoechoic nodule < 1 cm":["Nodular hyperplasia (benign — old dog)","Early hepatocellular carcinoma","Hepatic abscess (early)","Lymphoma — focal"],
       "Single hyperechoic nodule < 1 cm":["Nodular hyperplasia","Focal lipidosis (cat)","Haematoma — resolving","Hepatic adenoma"],
       "Target lesion (hypoechoic rim)":["Malignant neoplasia — HCC / carcinoma (PPV 74%)","Haemangiosarcoma metastasis","Lymphosarcoma","Benign nodular hyperplasia (less common)"],
       "Single solid mass > 1 cm":["Hepatocellular carcinoma (HCC)","Cholangiocarcinoma (cat — common)","Hepatic abscess","Haematoma","Hepatic adenoma"],
       "Single cavitary / cystic mass":["Simple hepatic cyst","Biliary cystadenoma (older cats)","Hepatic abscess (cavitary)","Haematoma (organising)"],
       "Multiple hypoechoic nodules":["Metastatic neoplasia — splenic HSA / GI carcinoma","Lymphosarcoma","Histiocytic sarcoma","Multifocal abscesses"],
       "Multiple hyperechoic nodules":["Metastatic carcinoma","Nodular hyperplasia","Mineralisation / old granulomas","Thyroid carcinoma metastasis"],
       "Multiple target lesions":["Malignant neoplasia (PPV 81% for malignancy)","Haemangiosarcoma — metastatic","Carcinomatosis"],
       "Diffuse nodularity — entire liver":["Hepatic lymphoma","Diffuse HSA","Nodular regeneration — cirrhosis","Mast cell tumour infiltration (cats)"],
       "Mixed echogenic mass":["Hepatocellular carcinoma — necrotic centre","Hepatic abscess with gas","Haematoma — mixed stage","Biliary cystadenoma (cats)"]}},
  {id:"span",lb:"Liver Span (cm)",t:"n",ph:"cm",ht:"Dog: 8–15 cm; Cat: 4–7 cm"},
  {id:"rem",lb:"Remarks",t:"txt",ph:"Portal hypertension signs, Doppler findings, lobe affected..."},
]},
// ─── GALL BLADDER ─────────────────────────────────────────
{id:"gb",lb:"Gall Bladder",ic:"🟡",ps:[
  {id:"sz",lb:"GB Size / Distension",t:"s",op:["Normal","Mildly distended","Markedly distended","Small / contracted","Wall oedema / double wall"]},
  {id:"wl",lb:"GB Wall Thickness",t:"s",op:["Normal < 1 mm","Mild thickening 1–3 mm","Marked thickening > 3 mm","Striated / oedematous wall","Focal wall irregularity"],
   df:{"Mild thickening 1–3 mm":["Cholecystitis — acute or chronic","Hypoalbuminaemia — any cause","Adjacent hepatitis / perihepatitis","Anorexia / prolonged fasting"],
       "Marked thickening > 3 mm":["Severe cholecystitis","Biliary mucocoele (early wall change)","Neoplasia — primary biliary carcinoma","Sclerosing cholangitis"],
       "Striated / oedematous wall":["Hypoalbuminaemia — PLE / PLN / hepatic failure","Portal hypertension","Congestive heart failure"],
       "Focal wall irregularity":["Cholecystic neoplasia","Polyp","Chronic cholecystitis"]}},
  {id:"ct",lb:"GB Content",t:"s",op:["Anechoic — normal bile","Biliary sludge — echogenic non-shadowing","Cholelithiasis — acoustic shadowing","Mucocoele — stellate / kiwi pattern","Haemobilia — echogenic clot","Gas in GB — emphysematous"],
   df:{"Biliary sludge — echogenic non-shadowing":["Cholestasis — any cause","Prolonged anorexia / hepatic disease","Haemolytic disease","Pre-mucocoele state"],
       "Cholelithiasis — acoustic shadowing":["Choleliths — incidental (often)","Cholelithiasis causing obstruction","Inflammatory / inspissated bile"],
       "Mucocoele — stellate / kiwi pattern":["Biliary mucocoele — surgical emergency if ruptured","Cystic duct obstruction","Dysmotility — Shetland Sheepdog predisposed"],
       "Haemobilia — echogenic clot":["Trauma — liver laceration","Coagulopathy","Post-biopsy complication"],
       "Gas in GB — emphysematous":["Emphysematous cholecystitis — Clostridium sp.","GI fistula to biliary tract"]}},
  {id:"cbd",lb:"Common Bile Duct Diameter",t:"n",ph:"mm",ht:"Dog: < 3 mm; Cat: < 4 mm (post-cholecystokinesis)"},
  {id:"cbd_app",lb:"CBD Appearance",t:"s",op:["Normal","Mildly dilated","Markedly dilated — obstruction","Echogenic wall","Calculi in CBD"]},
  {id:"rem",lb:"Remarks",t:"txt",ph:"GB wall vascularity, cystic duct appearance..."},
]},
// ─── SPLEEN ───────────────────────────────────────────────
{id:"spleen",lb:"Spleen",ic:"💧",ps:[
  {id:"sz",lb:"Size Assessment",t:"s",op:["Normal","Splenomegaly — mild","Splenomegaly — moderate","Splenomegaly — severe","Reduced size / splenectomy"],
   df:{"Splenomegaly — mild":["Reactive splenomegaly — systemic inflammation","Splenic congestion — portal hypertension","Sedation artefact (acepromazine)","Early lymphoid hyperplasia","Immune-mediated haemolytic anaemia"],
       "Splenomegaly — moderate":["Extramedullary haematopoiesis (EMH)","Splenic lymphoma","Haemangiosarcoma (HSA)","Mast cell tumour infiltration (cats)","Systemic histiocytosis"],
       "Splenomegaly — severe":["Haemangiosarcoma — primary or metastatic","Mast cell tumour (cats — diffuse)","Multicentric lymphoma","Splenic torsion","Diffuse sarcoma"]}},
  {id:"mg",lb:"Margins / Capsule",t:"s",op:["Smooth","Irregular — focal capsular bulge","Rounded margins","Subcapsular fluid"]},
  {id:"ec",lb:"Echogenicity",t:"s",op:["Normal — homogeneous fine texture","Hyperechoic — diffuse","Hypoechoic — diffuse","Coarsely heterogeneous — diffuse","Mottled — mild heterogeneity"],
   df:{"Hyperechoic — diffuse":["Chronic inflammatory disease","Nodular hyperplasia — multiple small","Mast cell infiltration (cats)","Splenic amyloidosis"],
       "Hypoechoic — diffuse":["Splenic lymphoma — classic pattern","Acute congestion","Leukaemia — lymphoid","Histiocytic sarcoma"],
       "Coarsely heterogeneous — diffuse":["Haemangiosarcoma","Complex haematoma","Multifocal abscess","Nodular regeneration"]}},
  {id:"ms",lb:"Focal Lesion / Mass",t:"s",op:["None","Hypoechoic nodule(s) < 1 cm","Hypoechoic mass 1–3 cm","Hypoechoic mass > 3 cm","Hyperechoic nodule < 1 cm","Target lesion","Cavitary / complex mass","Diffuse nodularity","Multiple mixed lesions"],
   df:{"Hypoechoic nodule(s) < 1 cm":["Nodular hyperplasia (most common old dog)","Lymphoma — early focal","Haematoma — small","Granuloma"],
       "Hypoechoic mass 1–3 cm":["Haemangiosarcoma — primary","Haematoma","Mast cell tumour (cats)","Lymphoma — focal"],
       "Hypoechoic mass > 3 cm":["Haemangiosarcoma (most common dog)","Haematoma — large","Splenic sarcoma","Abscess"],
       "Target lesion":["Haemangiosarcoma","Carcinoma metastasis","Lymphoma"],
       "Cavitary / complex mass":["Haemangiosarcoma — cavitary (classic)","Organised haematoma","Splenic abscess","Pseudocyst"],
       "Diffuse nodularity":["Nodular hyperplasia — diffuse (old dogs)","Diffuse lymphoma","Mast cell infiltration (cats)","Haemangiosarcoma — multifocal"],
       "Multiple mixed lesions":["Haemangiosarcoma + haematoma","Lymphoma with necrosis","Mast cell tumour + haematoma"]}},
  {id:"sv",lb:"Splenic Vein Diameter",t:"n",ph:"mm"},
  {id:"ef",lb:"Peritoneal Effusion Near Spleen",t:"s",op:["None","Trace","Moderate","Large — haemoperitoneum suspected"]},
  {id:"rem",lb:"Remarks",t:"txt",ph:"Splenic torsion signs, hilar vascularity..."},
]},
// ─── RIGHT KIDNEY ─────────────────────────────────────────
{id:"rk",lb:"Right Kidney",ic:"🫘",ps:[
  {id:"len",lb:"Length (cm)",t:"n",ph:"cm",ht:"Dog: 5.5–8.5 cm (BW corr.); Cat: 3.0–4.5 cm"},
  {id:"wid",lb:"Width (cm)",t:"n",ph:"cm"},
  {id:"cth",lb:"Cortical Thickness (mm)",t:"n",ph:"mm",ht:"Dog: 4–7 mm; Cat: 2–4 mm"},
  {id:"cmd",lb:"Corticomedullary Definition",t:"s",op:["Normal — distinct CMD","Mildly reduced CMD","Markedly reduced / loss of CMD","Enhanced CMD"]},
  {id:"ce",lb:"Cortical Echogenicity",t:"s",op:["Normal — < liver < spleen","Isoechoic to liver","Hyperechoic — mild (>liver <spleen)","Hyperechoic — marked (>spleen)","Hypoechoic — diffuse"],
   df:{"Isoechoic to liver":["Mild chronic renal disease","Glomerulonephritis — early","Normal variant (cats — isoechoic to liver is normal)"],
       "Hyperechoic — mild (>liver <spleen)":["Chronic interstitial nephritis","Early chronic renal failure","Glomerulonephritis"],
       "Hyperechoic — marked (>spleen)":["Advanced chronic renal failure","Ethylene glycol toxicity — acute","Glomerulonephritis — severe","Lymphoma (cats — bilateral diffuse hyperechogenicity)","Feline infectious peritonitis (FIP)"],
       "Hypoechoic — diffuse":["Acute nephritis — bacterial / toxic","Acute tubular necrosis","Oedema — acute kidney injury","Leptospirosis — acute"]}},

let cur=0,D={};
OR.forEach(o=>D[o.id]={});

function buildTabs(){
  document.getElementById("tabs").innerHTML=OR.map((o,i)=>`
    <div class="tab ${i===cur?"active":""} ${D[o.id]._done?"done":""}" onclick="go(${i})">
      ${o.ic} ${o.lb}${D[o.id]._done?" ✓":""}
    </div>`).join("");
  setTimeout(()=>{const t=document.querySelectorAll(".tab");if(t[cur])t[cur].scrollIntoView({inline:"center",behavior:"smooth"});},50);
}

function sv(){
  const o=OR[cur];
  o.ps.forEach(p=>{
    const el=document.getElementById(`f${o.id}${p.id}`);
    if(el) D[o.id][p.id]=el.value;
  });
}

function go(i){sv();cur=i;buildTabs();renderO();document.getElementById("content").scrollTop=0;}

function doneO(){
  sv();D[OR[cur].id]._done=true;
  if(cur<OR.length-1) cur++;
  buildTabs();renderO();
  document.getElementById("content").scrollTo({top:0,behavior:"smooth"});
}

function clrO(){D[OR[cur].id]={};renderO();}

function renderO(){
  const o=OR[cur];const sv2=D[o.id]||{};
  document.getElementById("opanel").innerHTML=`
    <div class="card">
      <div class="organ-head">
        <div class="organ-ico">${o.ic}</div>
        <div><div class="organ-lbl">${o.lb}</div>
        <div class="organ-sub">Tap fields · Record findings</div></div>
      </div>
      <div class="fg">${o.ps.map(p=>rF(o.id,p,sv2)).join("")}</div>
      <div class="btns">
        ${cur>0?`<button class="btn btn-s" onclick="go(${cur-1})">← Back</button>`:""}
        <button class="btn btn-s" onclick="clrO()">↺ Clear</button>
        <button class="btn btn-p" onclick="doneO()">Save &amp; Next →</button>
      </div>
    </div>`;
}

function rF(oid,p,sv2){
  const v=sv2[p.id]||"";
  if(p.t==="txt") return `<div class="f full"><label>${p.lb}</label>
    <textarea id="f${oid}${p.id}" rows="2" placeholder="${p.ph||""}">${v}</textarea></div>`;
  if(p.t==="n") return `<div class="f"><label>${p.lb}</label>
    <input type="number" step="0.1" inputmode="decimal" id="f${oid}${p.id}" placeholder="${p.ph||""}" value="${v}">
    ${p.ht?`<div class="hint">${p.ht}</div>`:""}
  </div>`;
  const ops=p.op.map(o=>`<option${v===o?" selected":""}>${o}</option>`).join("");
  return `<div class="f"><label>${p.lb}</label>
    <select id="f${oid}${p.id}">${ops}</select>
    ${p.ht?`<div class="hint">${p.ht}</div>`:""}
  </div>`;
}

function genReport(){
  sv();
  const g=id=>document.getElementById(id)?.value||"—";
  const name=g("pt-name"),sp=g("pt-sp"),breed=g("pt-breed"),age=g("pt-age"),
    wt=g("pt-wt"),owner=g("pt-owner"),contact=g("pt-contact"),ref=g("pt-ref"),
    complaint=g("pt-complaint"),fast=g("pt-fast"),sed=g("pt-sed"),
    mach=g("pt-mach"),probe=g("pt-probe"),caseNo=g("pt-case"),date=g("pt-date");

  let html=`<div class="rpage">
  <div class="lhead">
    <div class="lhead-title">Abdominal Ultrasound Report</div>
    <div class="lhead-sub">Dr. K.S. Saikrishna M.V.Sc, Ph.D.</div>
    <div class="lhead-addr">Assistant Professor &amp; Head, Department of Veterinary Medicine</div>
    <div class="lhead-addr">College of Veterinary Science, Proddatur — SVVU, Andhra Pradesh</div>
    <div class="lhead-line"></div>
    <div class="lhead-rtype">Dog / Cat — Organ-by-Organ Clinical Record</div>
  </div>
  <div class="pat-box">
    <div class="pat-box-title">Patient &amp; Owner Details</div>
    <div class="pat-grid">
      <div class="pat-row"><div class="pat-lbl">Case No.</div><div class="pat-val">${caseNo}</div></div>
      <div class="pat-row"><div class="pat-lbl">Date</div><div class="pat-val">${date}</div></div>
      <div class="pat-row"><div class="pat-lbl">Patient Name</div><div class="pat-val">${name}</div></div>
      <div class="pat-row"><div class="pat-lbl">Species / Breed</div><div class="pat-val">${sp} / ${breed}</div></div>
      <div class="pat-row"><div class="pat-lbl">Age / Sex</div><div class="pat-val">${age}</div></div>
      <div class="pat-row"><div class="pat-lbl">Body Wt.</div><div class="pat-val">${wt} kg</div></div>
      <div class="pat-row"><div class="pat-lbl">Owner</div><div class="pat-val">${owner}</div></div>
      <div class="pat-row"><div class="pat-lbl">Contact</div><div class="pat-val">${contact}</div></div>
      <div class="pat-row"><div class="pat-lbl">Ref. Clinician</div><div class="pat-val">${ref}</div></div>
      <div class="pat-row"><div class="pat-lbl">Complaint</div><div class="pat-val">${complaint}</div></div>
      <div class="pat-row"><div class="pat-lbl">Fasting</div><div class="pat-val">${fast}</div></div>
      <div class="pat-row"><div class="pat-lbl">Sedation</div><div class="pat-val">${sed}</div></div>
      <div class="pat-row"><div class="pat-lbl">Machine</div><div class="pat-val">${mach}</div></div>
      <div class="pat-row"><div class="pat-lbl">Probe / Freq.</div><div class="pat-val">${probe}</div></div>
    </div>
  </div>
  <div class="sec-bar">Organ-by-Organ Ultrasonographic Findings</div>
  <table class="organ-table">
    <tr>
      <th style="width:12%">Organ</th>
      <th style="width:28%">Parameters &amp; Values</th>
      <th style="width:36%">Findings</th>
      <th style="width:24%">Remarks</th>
    </tr>`;

  let allD=[],hasAbn=false,lesRows="";

  OR.forEach(organ=>{
    const d=D[organ.id];
    if(!organ.ps.some(p=>d[p.id])) return;
    let params="",findings="",remarks="",diffs=[];
    organ.ps.forEach(p=>{
      const v=d[p.id];if(!v) return;
      if(p.t==="txt"){if(v.trim()) remarks=v;return;}
      const abn=!isN(v);
      if(abn) hasAbn=true;
      const unit=p.t==="n"?(p.ph&&p.ph.match(/^(cm|mm)$/)?` ${p.ph}`:""):"";
      params+=`<div style="margin-bottom:3px"><span style="color:var(--mgray);font-size:10px">${p.lb}:</span> <b>${v}${unit}</b></div>`;
      if(abn) findings+=`<span class="abn-tag">${v}${unit}</span> `;
      else findings+=`<span class="norm-tag">WNL</span> `;
      if(p.df&&p.df[v]){
        diffs=[...diffs,...p.df[v]];
        allD=[...allD,...p.df[v]];
        if(v.toLowerCase().includes("mass")||v.toLowerCase().includes("nodule")||v.toLowerCase().includes("carcinoma")||v.toLowerCase().includes("tumour")){
          lesRows+=`<tr><td>${organ.lb}</td><td>${p.lb}</td><td>${v}</td><td>—</td><td>${p.df[v].slice(0,2).join(" / ")}</td></tr>`;
        }
      }
    });
    if(!params&&!findings) return;
    html+=`<tr><td><div class="organ-name">${organ.ic} ${organ.lb}</div></td>
      <td style="font-size:11px">${params}</td>
      <td>${findings||'<span class="norm-tag">WNL</span>'}</td>
      <td style="font-size:10px;color:var(--mgray);font-style:italic">${remarks||"—"}</td></tr>`;
    if(diffs.length){
      const ud=[...new Set(diffs)];
      html+=`<tr><td colspan="4" style="background:var(--lorange);padding:4px 8px">
        <span style="font-size:10px;font-weight:700;color:var(--orange)">⚠ Differentials — ${organ.lb}:</span>
        <span style="font-size:10px;color:var(--dgray)"> ${ud.join(" · ")}</span>
      </td></tr>`;
    }
  });

  html+=`</table>
  <div style="font-size:9px;color:var(--mgray);margin-bottom:10px;font-style:italic">WNL = Within Normal Limits · Correlate with haematology, biochemistry &amp; radiography · Ref: Mattoon &amp; Nyland — Small Animal Diagnostic Ultrasound 3e (Saunders 2015)</div>`;

  if(lesRows){
    html+=`<div class="sec-bar">Significant Lesions / Masses — Summary</div>
    <table class="lesion-table">
      <tr><th>Organ</th><th>Location / Parameter</th><th>Description</th><th>Size</th><th>Suspected Diagnosis</th></tr>
      ${lesRows}
    </table>`;
  }

  const uD=[...new Set(allD)];
  if(uD.length){
    html+=`<div class="sec-bar" style="border-color:var(--orange);color:var(--orange)">Differential Diagnoses — Consolidated</div>
    <table class="diff-table">
      <tr><th style="width:30px">#</th><th>Differential Diagnosis</th></tr>
      ${uD.map((d,i)=>`<tr><td style="font-weight:700;color:var(--navy)">${i+1}</td><td>${d}</td></tr>`).join("")}
    </table>`;
  }

  html+=`
  <div class="imp-box">
    <div class="imp-title">Overall Impression / Diagnosis</div>
    <div class="imp-body">${hasAbn?"The ultrasonographic examination reveals the findings detailed above. Clinical correlation with haematology, serum biochemistry, urinalysis, and histopathology/cytology is recommended for definitive diagnosis. Ultrasonographic findings should not be interpreted in isolation.":"No significant ultrasonographic abnormalities detected. All visualised organs appear within normal limits for species and age. Clinical correlation recommended."}</div>
  </div>
  <div class="rec-box">
    <div class="rec-title">Recommendations / Follow-up Imaging</div>
    <div class="rec-body" style="min-height:50px"></div>
  </div>
  <div class="sig-section">
    <div class="sig-block"><div class="sig-line"></div><div class="sig-label">Sonographer</div></div>
    <div class="sig-block">
      <div class="sig-line"></div>
      <div class="sig-label">Reporting Clinician</div>
      <div class="sig-name">Dr. K.S. Saikrishna M.V.Sc, Ph.D.</div>
    </div>
    <div class="sig-block"><div class="sig-line"></div><div class="sig-label">Signature &amp; Seal</div></div>
  </div>
  <div class="rep-footer">Dr. K.S. Saikrishna, M.V.Sc, Ph.D. · Dept. of Veterinary Medicine · CVSc Proddatur (SVVU) · Dog &amp; Cat Abdominal USG Report v3.0 · Reference: Mattoon &amp; Nyland, Small Animal Diagnostic Ultrasound 3e, Saunders 2015</div>
</div>`;

  document.getElementById("report").innerHTML=html;
  document.getElementById("app").style.display="none";
  const rb=document.getElementById("rep-bar");rb.style.display="flex";
  document.getElementById("report").style.display="block";
  window.scrollTo({top:0});
}

function backForm(){
  document.getElementById("report").style.display="none";
  document.getElementById("rep-bar").style.display="none";
  document.getElementById("app").style.display="flex";
}

function resetAll(){
  OR.forEach(o=>D[o.id]={});cur=0;
  ["pt-name","pt-breed","pt-age","pt-owner","pt-contact","pt-ref","pt-mach","pt-probe","pt-case","pt-complaint","pt-wt"].forEach(id=>{
    const el=document.getElementById(id);if(el) el.value="";
  });
  document.getElementById("pt-date").valueAsDate=new Date();
  buildTabs();renderO();
}

document.getElementById("pt-date").valueAsDate=new Date();
buildTabs();renderO();
</script>
