<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PRADARSH">
<meta name="theme-color" content="#0d1b3e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>PRADARSH</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0d1b3e;--teal:#0f6e56;--gold:#c8a84b;--red:#c62828;--orange:#e65100;--green:#1b5e20;--gray:#f2f2f7;--lgray:#e5e5ea;--dgray:#1c1c1e;--mgray:#6c6c70;--lgreen:#e8f5e9;--lorange:#fff3e0;--lnavy:#e8eaf6}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--gray);color:var(--dgray)}
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--navy);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
#logo-img{width:38px;height:38px;border-radius:9px;overflow:hidden;background:white;padding:2px;flex-shrink:0}
#logo-img img{width:100%;height:100%;object-fit:contain;display:block}
#topbar-txt{flex:1}
#topbar-name{font-size:15px;font-weight:800;letter-spacing:1px;color:#fff}
#topbar-sub{font-size:10px;color:rgba(255,255,255,0.6);margin-top:1px}
#new-btn{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
#tabs-bar{background:#fff;border-bottom:1px solid var(--lgray);overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;scrollbar-width:none;position:sticky;top:58px;z-index:99}
#tabs-bar::-webkit-scrollbar{display:none}
.t{padding:10px 11px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;color:var(--mgray);border-bottom:2.5px solid transparent;flex-shrink:0}
.t.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:700}
.t.ok{color:var(--teal);border-bottom-color:var(--teal)}
#body{padding:12px 12px 90px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.ctitle{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.oh{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--lgray)}
.oi{width:34px;height:34px;border-radius:9px;background:var(--lnavy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);flex-shrink:0;letter-spacing:0}
.olb{font-size:14px;font-weight:700;color:var(--navy)}
.osb{font-size:11px;color:var(--mgray);margin-top:1px}
.vrow{display:flex;gap:6px;flex-shrink:0}
.vb{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--teal);background:transparent;color:var(--teal)}
.vb.on{background:var(--teal);color:#fff}
.nb{border-color:var(--red);color:var(--red)}
.nb.on{background:var(--red);color:#fff}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.f{display:flex;flex-direction:column;gap:3px}
.f.full{grid-column:1/-1}
.f label{font-size:11px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
.f select,.f input,.f textarea{font-size:14px;padding:9px 10px;border-radius:10px;border:1px solid var(--lgray);background:var(--gray);color:var(--dgray);width:100%;-webkit-appearance:none}
.f select:focus,.f input:focus,.f textarea:focus{outline:none;border-color:var(--teal);background:#fff}
.hint{font-size:10px;color:var(--mgray);margin-top:1px}
.brow{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--lgray)}
.btn{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bs{background:var(--lgray);color:var(--dgray)}
.bp{background:var(--teal);color:#fff}
.nv-msg{text-align:center;padding:20px;color:var(--mgray);font-size:13px;background:var(--lgray);border-radius:10px;margin-bottom:10px}
#gen-btn{position:fixed;bottom:14px;left:14px;right:14px;z-index:200;background:var(--navy);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(13,27,62,.4)}
#rep-bar{background:var(--navy);padding:10px 14px;display:none;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.rb{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.rb2{background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
#report{display:none;padding:0 0 40px 0}
/* REPORT STYLES */
.rpage{background:#fff;margin:10px;border-radius:14px;padding:20px;box-shadow:0 1px 8px rgba(0,0,0,.1)}
.rhead{text-align:center;padding-bottom:12px;border-bottom:3px double var(--navy);margin-bottom:12px}
.rhead img{width:80px;height:80px;object-fit:contain;display:block;margin:0 auto 8px}
.rhead-title{font-size:15px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px}
.rhead-name{font-size:12px;font-weight:700;color:var(--navy);margin-top:3px}
.rhead-dept{font-size:11px;color:var(--mgray);margin-top:2px}
.rhead-line{height:2px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--teal));border-radius:2px;margin:8px 0 4px}
.pat-sect{border:1.5px solid var(--navy);border-radius:8px;margin-bottom:14px;overflow:hidden}
.pat-sect-title{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;text-transform:uppercase;letter-spacing:.5px}
.pat-row{display:flex;border-bottom:.5px solid var(--lgray);font-size:11px}
.pat-row:last-child{border-bottom:none}
.pat-lbl{font-weight:700;color:var(--navy);padding:5px 8px;min-width:95px;border-right:.5px solid var(--lgray);background:var(--lnavy);text-transform:uppercase;font-size:10px;letter-spacing:.3px}
.pat-val{color:var(--dgray);padding:5px 8px;flex:1}
.exam-intro{font-size:11px;color:var(--mgray);font-style:italic;margin-bottom:14px;line-height:1.6}
.sect-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid var(--navy);padding-bottom:3px;margin-bottom:10px}
/* DACVR STYLE FINDINGS */
.finding-row{margin-bottom:8px;font-size:12px;line-height:1.75;display:flex;gap:4px}
.finding-organ{font-weight:700;color:var(--dgray);min-width:150px;flex-shrink:0}
.finding-text{color:var(--dgray);flex:1}
.finding-text.abn{color:var(--dgray)}
/* CONCLUSIONS */
.conc-list{padding-left:18px;margin:0}
.conc-list li{font-size:12px;line-height:1.75;margin-bottom:6px;color:var(--dgray)}
.conc-list li b{color:var(--navy)}
/* DIFFERENTIALS */
.diff-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.diff-chip{background:var(--lorange);border:1px solid #f0c080;border-radius:5px;padding:2px 9px;font-size:10px;color:var(--orange);font-weight:500}
/* IMPRESSION BOX */
.imp-box{border:2px solid var(--navy);border-radius:8px;margin-bottom:12px;overflow:hidden}
.imp-title{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.ai-btn{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.imp-body{padding:10px;font-size:12px;color:var(--dgray);line-height:1.75;min-height:50px}
.rec-box{border:2px solid var(--teal);border-radius:8px;margin-bottom:14px;overflow:hidden}
.rec-title{background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;text-transform:uppercase}
.rec-body{padding:10px;font-size:12px;color:var(--dgray);min-height:40px}
.sig-row{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:2px solid var(--navy)}
.sig-blk{text-align:center}
.sig-line{border-bottom:1px solid var(--dgray);width:130px;margin-bottom:4px}
.sig-lbl{font-size:10px;color:var(--mgray)}
.sig-name{font-size:11px;font-weight:700;color:var(--navy);margin-top:2px}
.rfooter{text-align:center;font-size:9px;color:var(--mgray);margin-top:12px;padding-top:8px;border-top:.5px solid var(--lgray);line-height:1.6}
.img-upload-box{border:2px dashed var(--lgray);border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin-top:10px;transition:border-color .2s}
.img-upload-box:active{border-color:var(--teal)}
.img-upload-box input[type=file]{display:none}
.img-upload-label{font-size:12px;color:var(--mgray);cursor:pointer}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.img-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--lgray)}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.img-thumb-del{position:absolute;top:3px;right:3px;background:rgba(198,40,40,.85);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.img-caption{font-size:10px;color:var(--mgray);text-align:center;margin-top:3px;padding:0 2px}
/* Report image grid */
.rep-img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.rep-img-cell{border:1px solid var(--lgray);border-radius:8px;overflow:hidden}
.rep-img-cell img{width:100%;display:block}
.rep-img-cap{font-size:9px;color:var(--mgray);text-align:center;padding:4px;background:#fafafa}
@media print{#app,#rep-bar,#gen-btn{display:none!important}#report{display:block!important;padding:0}.rpage{margin:0;border-radius:0;box-shadow:none;border:none}@page{size:A4;margin:10mm}}
</style>
</head>

var isN=function(v){return !v||NV.has(v)||v.indexOf("Normal")===0||v==="None"||v==="NA"||v==="Absent"||v.indexOf("Not vis")===0||v==="Not dilated";};

  D[OR[i].id]={};

  if(icEl) OR[i].ic=icEl.textContent||OR[i].ic;
}

function tabs(){
  var h="";
  for(var i=0;i<OR.length;i++){
    var o=OR[i];
    var cls="t"+(i===cur?" on":"")+(D[o.id]._done?" ok":"");
    h+='<div class="'+cls+'" onclick="go('+i+')"><img src="'+ICONS[o.id]+'" style="width:18px;height:18px;border-radius:3px;vertical-align:middle;margin-right:4px"> '+o.lb+(D[o.id]._done?' ✓':'')+' </div>';
  }
  document.getElementById("tabs-bar").innerHTML=h;
  setTimeout(function(){var el=document.querySelectorAll(".t")[cur];if(el)el.scrollIntoView({inline:"center",behavior:"smooth"});},50);
}
function save(){
  var o=OR[cur];
  for(var i=0;i<o.ps.length;i++){
    var el=document.getElementById("f"+o.id+o.ps[i].id);
    if(el) D[o.id][o.ps[i].id]=el.value;
  }
}

function go(i){save();cur=i;tabs();render();document.getElementById("body").scrollTop=0;}
function done(){save();D[OR[cur].id]._done=true;if(cur<OR.length-1)cur++;tabs();render();document.getElementById("body").scrollTo(0,0);}
function clr(){D[OR[cur].id]={};render();}
function vizV(){save();D[OR[cur].id]._viz="Visualised";render();}
function vizN(){save();D[OR[cur].id]._viz="Not Visualised";render();}

function field(oid,p,sv){
  var v=sv[p.id]||"";
  if(p.t==="txt") return '<div class="f full"><label>'+p.lb+'</label><textarea id="f'+oid+p.id+'" rows="2" placeholder="'+(p.ph||'')+'">'+v+'</textarea></div>';
  if(p.t==="n") return '<div class="f"><label>'+p.lb+'</label><input type="number" step="0.1" inputmode="decimal" id="f'+oid+p.id+'" placeholder="'+(p.ph||'')+'" value="'+v+'"><div class="hint">'+(p.ht||'')+'</div></div>';
  var ops="";
  for(var i=0;i<p.op.length;i++) ops+='<option'+(v===p.op[i]?' selected':'')+'>'+p.op[i]+'</option>';
  var onch=p.df?'onchange="showDiffs(\''+oid+'\',\''+p.id+'\',this.value)"':'';
  var diffBox=p.df?'<div id="diffs-'+oid+p.id+'" style="display:none"></div>':'';
  return '<div class="f"><label>'+p.lb+'</label><select id="f'+oid+p.id+'" '+onch+'>'+ops+'</select>'+(p.ht?'<div class="hint">'+p.ht+'</div>':'')+diffBox+'</div>';
}
function showDiffs(oid, pid, val){
  // Called when a select changes - show differential checkboxes
  var diffs = null;
  for(var i=0;i<OR.length;i++){
    if(OR[i].id===oid){
      for(var j=0;j<OR[i].ps.length;j++){
        if(OR[i].ps[j].id===pid && OR[i].ps[j].df && OR[i].ps[j].df[val]){
          diffs = OR[i].ps[j].df[val];
          break;
        }
      }
    }
  }
  var container = document.getElementById("diffs-"+oid+pid);
  if(!container) return;
  if(!diffs || isN(val)){
    container.innerHTML="";
    container.style.display="none";
    return;
  }
  // Show checkboxes - pre-select all by default
  if(!D[oid]) D[oid]={};
  if(!D[oid]._diffs) D[oid]._diffs={};
  // Default: all selected
  if(!D[oid]._diffs[pid]) D[oid]._diffs[pid]=diffs.slice();
  var h='<div style="background:var(--lorange);border:1px solid #f0c080;border-radius:8px;padding:8px;margin-top:4px">';
  h+='<div style="font-size:10px;font-weight:700;color:var(--orange);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">Select differentials for report:</div>';
  for(var i=0;i<diffs.length;i++){
    var checked = D[oid]._diffs[pid].indexOf(diffs[i])>-1 ? "checked" : "";
    h+='<label style="display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;font-size:12px;color:var(--dgray)">';
    h+='<input type="checkbox" '+checked+' data-oid="'+oid+'" data-pid="'+pid+'" data-diff="'+encodeURIComponent(diffs[i])+'" onchange="toggleDiffEl(this)" style="width:16px;height:16px;cursor:pointer">';
    h+=diffs[i]+'</label>';
  }
  h+='</div>';
  container.innerHTML=h;
  container.style.display="block";
}

function toggleDiffEl(el){
  var oid=el.getAttribute('data-oid');
  var pid=el.getAttribute('data-pid');
  var diff=decodeURIComponent(el.getAttribute('data-diff'));
  toggleDiff(oid,pid,diff,el.checked);
}

function toggleDiff(oid, pid, diff, checked){
  if(!D[oid]) D[oid]={};
  if(!D[oid]._diffs) D[oid]._diffs={};
  if(!D[oid]._diffs[pid]) D[oid]._diffs[pid]=[];
  var arr=D[oid]._diffs[pid];
  var idx=arr.indexOf(diff);
  if(checked && idx===-1) arr.push(diff);
  if(!checked && idx>-1) arr.splice(idx,1);
}

function render(){
  var o=OR[cur];
  var sv=D[o.id]||{};
  var nv=sv._viz==="Not Visualised";
  var h='<div class="card"><div class="oh">';

  h+='<div class="vrow">';
  h+='<button class="vb'+(nv?'':" on")+'" onclick="vizV()">Vis</button>';
  h+='<button class="vb nb'+(nv?' on':'')+'" onclick="vizN()">NV</button>';
  h+='</div></div>';
  if(nv){
    h+='<div class="nv-msg">Not Visualised &mdash; organ not assessable</div>';

    h+='<div class="fg">';

  h+='<div class="img-upload-box" onclick="addImg(\''+oid2+'\')">';

function addImg(organId){
  var input=document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.multiple=true;
  input.onchange=function(){
    var files=Array.prototype.slice.call(input.files);
    files.forEach(function(file){
      var reader=new FileReader();
      reader.onload=function(e){
        IMGS.push({src:e.target.result,caption:organId,organId:organId});
        renderImgGallery(organId);
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}

function delImg(idx){
  IMGS.splice(idx,1);
  // Re-render current organ gallery
  if(CUR_OR&&CUR_OR[cur]) renderImgGallery(CUR_OR[cur].id);
}

function renderImgGallery(organId){
  var el=document.getElementById("img-gallery-"+organId);
  if(!el) return;
  var organ_imgs=[];
  for(var i=0;i<IMGS.length;i++){if(IMGS[i].organId===organId) organ_imgs.push({img:IMGS[i],idx:i});}
  if(!organ_imgs.length){el.innerHTML="";return;}
  var h='<div class="img-grid">';
  for(var j=0;j<organ_imgs.length;j++){
    var idx=organ_imgs[j].idx;
    h+='<div>';
    h+='<div class="img-thumb"><img src="'+organ_imgs[j].img.src+'" alt="scan">';
    h+='<button class="img-thumb-del" onclick="delImg('+idx+')">×</button></div>';
    h+='<div class="img-caption">'+organ_imgs[j].img.organId+'</div>';
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

function genUSGReport(){
  var g=function(id){var el=document.getElementById(id);return el?el.value||" ":" ";};
  var name=g("pt-name"),sp=g("pt-sp"),breed=g("pt-breed"),age=g("pt-age"),
      wt=g("pt-wt"),owner=g("pt-owner"),contact=g("pt-contact"),ref=g("pt-ref"),
      complaint=g("pt-complaint"),fast=g("pt-fast"),sed=g("pt-sed"),
      mach=g("pt-mach"),probe=g("pt-probe"),cno=g("pt-case"),date=g("pt-date");

  var logoSrc=document.getElementById("logo-el").src;
  var h='<div class="rpage">';
  h+=getLetterhead(logoSrc,"Abdominal Ultrasound Report",date,name,sp,breed,age,wt,owner,contact,ref,complaint,mach,probe,cno,fast,sed);
  h+='<p class="exam-intro">A complete abdominal ultrasound examination was performed on '+date+'. Patient was '+fast.toLowerCase()+'. Sedation: '+sed+'. Transducer frequency: '+probe+'.</p>';
  h+='<div class="sect-title">Findings</div>';

  var allD=[],conc=[],cNum=1,hasAbn=false;
  for(var oi=0;oi<OR.length;oi++){
    var organ=OR[oi];
    var d=D[organ.id]||{};
    var vz=d._viz||"Visualised";
    if(vz==="Not Visualised"){
      h+='<div class="finding-row"><div class="finding-organ">'+organ.lb+':</div><div class="finding-text"><em>Not visualised on this examination.</em></div></div>';
      continue;
    }
    var hasData=false;
    for(var pi=0;pi<organ.ps.length;pi++){if(d[organ.ps[pi].id]&&organ.ps[pi].id!="_viz"){hasData=true;break;}}
    if(!hasData) continue;
    var parts=[],nums=[],remarks="",diffs=[];
    for(var pi=0;pi<organ.ps.length;pi++){
      var p=organ.ps[pi];var v=d[p.id];
      if(!v||p.id==="_viz") continue;
      if(p.t==="txt"){if(v.trim())remarks=v;continue;}
      var abn=!isN(v);
      if(abn) hasAbn=true;
      var unit=(p.t==="n"&&p.ph&&(p.ph==="cm"||p.ph==="mm"))?" "+p.ph:"";
      if(p.t==="n"&&v) nums.push(p.lb.toLowerCase()+" measuring "+v+unit);
      else if(abn){
        parts.push(v);
        if(p.df&&p.df[v]){
          var allDD=p.df[v];
          var selDD=(d._diffs&&d._diffs[p.id]&&d._diffs[p.id].length>0)?d._diffs[p.id]:allDD.slice(0,3);
          for(var di=0;di<selDD.length;di++){diffs.push(selDD[di]);allD.push(selDD[di]);}
          conc.push({n:cNum++,org:organ.lb,find:v,diffs:selDD});
        }
      }
    }
    var nar="";
    if(!parts.length&&!nums.length&&!remarks){nar="Unremarkable.";}
    else{
      if(parts.length) nar+=parts.join(". ")+". ";
      if(nums.length) nar+=(parts.length?"":"Normal; ")+nums.join("; ")+". ";
      if(remarks) nar+=remarks+". ";
      nar=nar.trim();
    }
    h+='<div class="finding-row"><div class="finding-organ">'+organ.lb+':</div><div class="finding-text">'+nar+'</div></div>';
  }

  if(allD.length){
    var uD=[];
    for(var i=0;i<allD.length;i++){if(uD.indexOf(allD[i])===-1&&uD.length<16)uD.push(allD[i]);}
    h+='<div class="sect-title" style="border-color:var(--orange);color:var(--orange);margin-top:14px">Differential Diagnoses</div>';
    h+='<div class="diff-chips">';
    for(var i=0;i<uD.length;i++) h+='<span class="diff-chip">'+uD[i]+'</span>';
    h+='</div>';
  }
  h+=getConclusionBox(conc,hasAbn,"usg");
  h+=getImagesSection();
  h+=getSignature();
  h+='</div>';
  showReport(h);
}

function genEchoReport(){
  var g=function(id){var el=document.getElementById(id);return el?el.value||"":" ";};
  var name=g("pt-name"),sp=g("pt-sp"),breed=g("pt-breed"),age=g("pt-age"),
      wt=g("pt-wt"),owner=g("pt-owner"),contact=g("pt-contact"),ref=g("pt-ref"),
      complaint=g("pt-complaint"),sed=g("pt-sed"),
      mach=g("pt-mach"),probe=g("pt-probe"),cno=g("pt-case"),date=g("pt-date");

  var logoSrc=document.getElementById("logo-el").src;
  var h='<div class="rpage">';
  h+=getLetterhead(logoSrc,"Echocardiography Report",date,name,sp,breed,age,wt,owner,contact,ref,complaint,mach,probe,cno,"N/A",sed);

  // ── STUDY PARAMETERS ───────────────────────────────────────
  var ds=D["echo_pt"]||{};
  var dlv=D["echo_lv"]||{};
  var dla=D["echo_la"]||{};
  var dmv=D["echo_mv"]||{};
  var drv=D["echo_rv"]||{};
  var dpv=D["echo_pv"]||{};
  var dav=D["echo_av"]||{};
  var dpc=D["echo_peri"]||{};
  var dcong=D["echo_cong"]||{};
  var ddx=D["echo_dx"]||{};

  h+='<p class="exam-intro">A complete echocardiographic examination was performed on '+date+'. Heart rate: '+(ds.hr||"—")+' bpm. Rhythm: '+(ds.rhythm||"—")+'. Sedation: '+(ds.sed||sed)+'. Image quality: '+(ds.quality||"—")+'.</p>';

  // ── MEASUREMENTS TABLE ──────────────────────────────────────
  h+='<div class="sect-title">Measurements</div>';
  h+='<table style="width:100%;border-collapse:collapse;margin-bottom:14px;font-size:11px">';
  h+='<tr style="background:var(--navy);color:#fff"><th style="padding:5px 8px;text-align:left">Parameter</th><th style="padding:5px 8px;text-align:center">Value</th><th style="padding:5px 8px;text-align:left">Normal Range</th><th style="padding:5px 8px;text-align:center">Status</th></tr>';

  var bw=parseFloat(wt)||10;
  var measurements=[
    {lb:"LVd (cm)",v:dlv.lvd,norm:"1.53×BW^0.294",calc:function(w){return (1.53*Math.pow(w,0.294)).toFixed(2);},tol:0.25},
    {lb:"LVs (cm)",v:dlv.lvs,norm:"0.95×BW^0.315",calc:function(w){return (0.95*Math.pow(w,0.315)).toFixed(2);},tol:0.25},
    {lb:"SF (%)",v:dlv.sf,norm:"Dog:25-45%; Cat:35-65%",lo:25,hi:sp==="Feline"?65:45},
    {lb:"EF (%)",v:dlv.ef,norm:"> 50%",lo:50,hi:100},
    {lb:"IVSd (cm)",v:dlv.ivsd,norm:"0.41×BW^0.241",calc:function(w){return (0.41*Math.pow(w,0.241)).toFixed(2);},tol:0.2},
    {lb:"LVFWd (cm)",v:dlv.lvfwd,norm:"0.42×BW^0.232",calc:function(w){return (0.42*Math.pow(w,0.232)).toFixed(2);},tol:0.2},
    {lb:"Ao (cm)",v:dla.ao,norm:"0.78×BW^0.341",calc:function(w){return (0.78*Math.pow(w,0.341)).toFixed(2);},tol:0.2},
    {lb:"LA (cm)",v:dla.la,norm:"0.76×BW^0.345",calc:function(w){return (0.76*Math.pow(w,0.345)).toFixed(2);},tol:0.2},
    {lb:"LA:Ao",v:dla.laao,norm:"Dog:<1.3 (TM); Cat:<1.5",lo:0,hi:sp==="Feline"?1.5:1.3},
    {lb:"RVd (cm)",v:drv.rvd,norm:"0.493×BW^0.391",calc:function(w){return (0.493*Math.pow(w,0.391)).toFixed(2);},tol:0.2},
    {lb:"E wave (m/s)",v:dmv.e_wave,norm:"Dog:0.7-1.0; Cat:0.6-0.8",lo:sp==="Feline"?0.6:0.7,hi:sp==="Feline"?0.8:1.0},
    {lb:"A wave (m/s)",v:dmv.a_wave,norm:"Dog:0.5-0.7; Cat:0.4-0.6",lo:sp==="Feline"?0.4:0.5,hi:sp==="Feline"?0.6:0.7},
    {lb:"E/A ratio",v:dmv.ea_ratio,norm:"Dog:1.0-2.0; Cat:0.8-2.0",lo:sp==="Feline"?0.8:1.0,hi:2.0},
    {lb:"Ao velocity (m/s)",v:dav.ao_vel,norm:"1.0-1.8 m/s",lo:0,hi:1.8},
    {lb:"Pulm. velocity (m/s)",v:dpv.pv_vel,norm:"0.9-1.5 m/s",lo:0,hi:1.5},
    {lb:"TR velocity (m/s)",v:drv.tr_vel,norm:"< 2.5 m/s (PAH if > 2.8)",lo:0,hi:2.5},
    {lb:"SPAP (mmHg)",v:drv.spap,norm:"< 30 mmHg",lo:0,hi:30},
    {lb:"TAPSE (cm)",v:drv.tapse,norm:"Dog: > 1.3 cm",lo:1.3,hi:99},
    {lb:"MR velocity (m/s)",v:dmv.mr_vel,norm:"> 4.0 m/s (adequate BP)",lo:4.0,hi:99},
  ];

  for(var mi=0;mi<measurements.length;mi++){
    var m=measurements[mi];
    if(!m.v) continue;
    var val=parseFloat(m.v);
    var normTxt=m.norm;
    var status="";var statusCol="";
    if(m.calc){
      var expected=parseFloat(m.calc(bw));
      var lo2=expected*(1-m.tol);
      var hi2=expected*(1+m.tol);
      normTxt=m.calc(bw)+" cm (±"+Math.round(m.tol*100)+"%)";
      if(val<lo2){status="LOW";statusCol="var(--red)";}
      else if(val>hi2){status="HIGH";statusCol="var(--orange)";}
      else{status="WNL";statusCol="var(--green)";}
    } else if(m.lo!==undefined){
      if(val<m.lo){status="LOW";statusCol="var(--red)";}
      else if(val>m.hi){status="HIGH";statusCol="var(--orange)";}
      else{status="WNL";statusCol="var(--green)";}
    }
    var rowBg=(mi%2===0)?"#fff":"#fafafa";
    h+='<tr style="background:'+rowBg+'">';
    h+='<td style="padding:5px 8px;font-weight:600;color:var(--navy)">'+m.lb+'</td>';
    h+='<td style="padding:5px 8px;text-align:center;font-weight:700">'+m.v+'</td>';
    h+='<td style="padding:5px 8px;color:var(--mgray);font-size:10px">'+normTxt+'</td>';
    h+='<td style="padding:5px 8px;text-align:center;font-weight:700;color:'+statusCol+'">'+status+'</td>';
    h+='</tr>';
  }
  h+='</table>';

  // ── FINDINGS NARRATIVE ──────────────────────────────────────
  h+='<div class="sect-title">Findings</div>';

  var sections=[
    {id:"echo_lv",lb:"Left Ventricle"},
    {id:"echo_la",lb:"Left Atrium / Aorta"},
    {id:"echo_mv",lb:"Mitral Valve"},
    {id:"echo_rv",lb:"Right Ventricle"},
    {id:"echo_pv",lb:"Pulmonic Valve"},
    {id:"echo_av",lb:"Aortic Valve / LVOTO"},
    {id:"echo_peri",lb:"Pericardium"},
    {id:"echo_cong",lb:"Congenital Defects"},
  ];

  var allD2=[],conc2=[],cNum2=1,hasAbn2=false;

  for(var si=0;si<sections.length;si++){
    var sec=sections[si];
    var dd=D[sec.id]||{};
    var parts2=[],nums2=[],remarks2="";
    var hasData2=false;
    for(var pi2=0;pi2<ECHO_OR.length;pi2++){
      if(ECHO_OR[pi2].id!==sec.id) continue;
      var ecOrgan=ECHO_OR[pi2];
      for(var pj=0;pj<ecOrgan.ps.length;pj++){
        var p2=ecOrgan.ps[pj];
        var v2=dd[p2.id];
        if(!v2) continue;
        if(p2.t==="txt"){if(v2.trim())remarks2=v2;hasData2=true;continue;}
        hasData2=true;
        var abn2=!isN(v2);
        if(abn2) hasAbn2=true;
        var unit2=(p2.t==="n"&&p2.ph&&(p2.ph==="cm"||p2.ph==="mm"||p2.ph==="%"||p2.ph==="bpm"||p2.ph==="mmHg"||p2.ph==="m/s"||p2.ph==="ms"||p2.ph==="ratio"))?" "+p2.ph:"";
        if(p2.t==="n"&&v2) nums2.push(p2.lb.toLowerCase()+" "+v2+unit2);
        else if(abn2){
          parts2.push(v2);
          if(p2.df&&p2.df[v2]){
            var dd2=p2.df[v2].slice(0,3);
            for(var dk=0;dk<dd2.length;dk++) allD2.push(dd2[dk]);
            conc2.push({n:cNum2++,org:sec.lb,find:v2,diffs:dd2});
          }
        }
      }
    }
    if(!hasData2) continue;
    var nar2="";
    if(!parts2.length&&!nums2.length&&!remarks2){nar2="Within normal limits.";}
    else{
      if(parts2.length) nar2+=parts2.join(". ")+". ";
      if(nums2.length) nar2+=(parts2.length?"":"Measurements: ")+nums2.join("; ")+". ";
      if(remarks2) nar2+=remarks2+". ";
      nar2=nar2.trim();
    }
    h+='<div class="finding-row"><div class="finding-organ">'+sec.lb+':</div><div class="finding-text">'+nar2+'</div></div>';
  }

  // ── DIAGNOSIS / ACVIM ───────────────────────────────────────
  if(ddx.primary_dx&&ddx.primary_dx.trim()&&ddx.primary_dx!=" "){
    h+='<div class="sect-title" style="margin-top:14px">Diagnosis</div>';
    h+='<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px">'+ddx.primary_dx+'</div>';
    if(ddx.stage&&ddx.stage!="NA — not DMVD"&&ddx.stage.trim()){
      h+='<div style="font-size:11px;color:var(--teal);margin-bottom:4px">ACVIM Stage: '+ddx.stage+'</div>';
    }
    if(ddx.chf&&ddx.chf.trim()&&ddx.chf!=" "){
      h+='<div style="font-size:11px;color:var(--red);margin-bottom:4px">CHF Status: '+ddx.chf+'</div>';
    }
  }

  h+=getConclusionBox(conc2,hasAbn2,"echo");
  h+=getImagesSection();
  h+=getSignature();
  h+='</div>';
  showReport(h);
}

function genAI(){
  var btn=document.querySelector(".ai-btn");
  var box=document.getElementById("imp-body");
  if(!btn||!box) return;
  btn.textContent="Generating...";
  btn.disabled=true;

  var sp=document.getElementById("pt-sp").value||"Canine";
  var breed=document.getElementById("pt-breed").value||"";
  var age=document.getElementById("pt-age").value||"";
  var name=document.getElementById("pt-name").value||"the patient";

  // Collect all abnormal findings with their differentials
  var findings=[];
  var cNum=1;
  var conclusions=[];

  for(var oi=0;oi<OR.length;oi++){
    var organ=OR[oi];
    var d=D[organ.id]||{};
    var viz=d._viz||"Visualised";
    if(viz==="Not Visualised") continue;

    for(var pi=0;pi<organ.ps.length;pi++){
      var p=organ.ps[pi];
      var v=d[p.id];
      if(!v||p.t==="txt"||p.id==="_viz") continue;
      if(isN(v)) continue;

      // Build conclusion for each abnormal finding
      var conc="";
      var unit=(p.t==="n"&&p.ph&&(p.ph==="cm"||p.ph==="mm"))?" "+p.ph:"";

      if(p.t==="n"){
        // Numeric value — compare to normal
        var val=parseFloat(v);
        conc=organ.lb+": "+p.lb+" measures "+v+unit+".";
      } else {
        // Dropdown finding
        conc=organ.lb+": "+v+".";
        // Add differentials if available
        if(p.df&&p.df[v]){
          var allDD=p.df[v];
          var dd=(d._diffs&&d._diffs[p.id]&&d._diffs[p.id].length>0)?d._diffs[p.id]:allDD.slice(0,3);
          conc+=" Differentials include "+dd.join(" versus ")+".";
          // Add recommendation based on finding type
          var rec=getRec(organ.id,v);
          if(rec) conc+=" "+rec;
        }
      }

      if(conc){
        conclusions.push(cNum+". "+conc);
        cNum++;
      }
    }
  }

  var output="";
  if(conclusions.length===0){
    output="No significant ultrasonographic abnormalities detected. All visualised abdominal organs appear within normal limits for a "+sp+(breed?" ("+breed+")":"")+(age?", aged "+age:"")+". Clinical correlation with physical examination findings is recommended.";
  } else {
    // Intro sentence
    output='Ultrasonographic examination of '+name+', a '+sp+(breed?' ('+breed+')':'')+(age?', aged '+age:'')+', reveals the following significant findings:\n\n';
    output+=conclusions.join('\n\n');
    output+='\n\nCorrelation with haematology, serum biochemistry, urinalysis, and where indicated histopathology or cytology is recommended for definitive diagnosis.';  }

  box.innerHTML='<div style="white-space:pre-line;line-height:1.9;font-size:12px">'+output+'</div><div style="font-size:9px;color:var(--mgray);margin-top:8px;border-top:1px solid var(--lgray);padding-top:6px">Auto-generated from entered findings &middot; Clinical correlation recommended &middot; PRADARSH v1.0</div>';
  btn.textContent="Regenerate";
  btn.disabled=false;
}

function getRec(organId, finding){
  var f=finding.toLowerCase();
  // Liver
  if(organId==="liver"){
    if(f.indexOf("hepatomegaly")>-1) return "Hepatic biochemistry panel and bile acids recommended.";
    if(f.indexOf("mass")>-1||f.indexOf("nodule")>-1) return "Fine needle aspirate or ultrasound-guided biopsy recommended.";
    if(f.indexOf("lipidosis")>-1) return "Hepatic lipidosis protocol — nutritional support indicated (cats).";
    if(f.indexOf("mucocoele")>-1) return "Surgical consultation recommended.";
  }
  // Gall bladder
  if(organId==="gb"){
    if(f.indexOf("mucocoele")>-1) return "Surgical cholecystectomy recommended — monitor for rupture.";
    if(f.indexOf("sludge")>-1) return "Ursodeoxycholic acid therapy and dietary management recommended.";
  }
  // Kidney
  if(organId==="rk"||organId==="lk"){
    if(f.indexOf("hydronephrosis")>-1) return "Ureteral obstruction must be ruled out — ureteral stenting may be indicated.";
    if(f.indexOf("calculi")>-1) return "Urinalysis, urine culture, and metabolic workup recommended.";
    if(f.indexOf("renal failure")>-1) return "IRIS staging and renal protocol management recommended.";
    if(f.indexOf("lymphoma")>-1) return "Renal cytology and oncology consultation recommended.";
  }
  // Bladder
  if(organId==="ub"){
    if(f.indexOf("tcc")>-1||f.indexOf("transitional")>-1) return "Urine cytology, BRAF mutation test, and cystoscopy recommended.";
    if(f.indexOf("urolithiasis")>-1) return "Stone analysis, dietary modification, and urinary acidifier/alkaliniser as appropriate.";
    if(f.indexOf("cystitis")>-1) return "Urine culture and sensitivity, appropriate antibiotic therapy.";
  }
  // Spleen
  if(organId==="spleen"){
    if(f.indexOf("haemangiosarcoma")>-1||f.indexOf("cavitary")>-1) return "Emergency surgical splenectomy recommended. Chest radiographs for metastatic screening.";
    if(f.indexOf("lymphoma")>-1) return "Splenic aspirate and oncology consultation recommended.";
    if(f.indexOf("mass")>-1) return "Surgical splenectomy and histopathology recommended.";
  }
  // Adrenal
  if(organId==="adr"){
    if(f.indexOf("pdh")>-1||f.indexOf("bilateral")>-1) return "ACTH stimulation test and low dose dexamethasone suppression test recommended.";
    if(f.indexOf("nodule")>-1||f.indexOf("unilateral")>-1) return "Adrenal function testing and surgical adrenalectomy consultation recommended.";
    if(f.indexOf("phaeochromocytoma")>-1) return "Blood pressure monitoring and alpha blockade prior to any surgical intervention.";
  }
  // Pancreas
  if(organId==="pan"){
    if(f.indexOf("pancreatitis")>-1) return "Fasting, IV fluid support, analgesia, and PLI assay recommended.";
    if(f.indexOf("insulinoma")>-1) return "Blood glucose curve and surgical consultation recommended.";
    if(f.indexOf("epi")>-1) return "TLI assay confirmation and pancreatic enzyme supplementation.";
  }
  // GI
  if(organId==="si"||organId==="stomach"||organId==="li"){
    if(f.indexOf("lymphoma")>-1) return "Full thickness biopsy via endoscopy or laparotomy recommended for definitive diagnosis.";
    if(f.indexOf("foreign body")>-1||f.indexOf("obstruction")>-1) return "Surgical or endoscopic retrieval recommended urgently.";
    if(f.indexOf("intussusception")>-1) return "Emergency surgical intervention recommended.";
  }
  // Uterus
  if(organId==="uter"){
    if(f.indexOf("pyometra")>-1) return "Emergency ovariohysterectomy recommended. IV antibiotics and fluid stabilisation prior to surgery.";
    if(f.indexOf("ceh")>-1) return "Ovariohysterectomy recommended. Progesterone levels to be assessed.";
  }
  // Peritoneum
  if(organId==="peri"){
    if(f.indexOf("haemoabdomen")>-1) return "Emergency exploratory laparotomy recommended. Blood typing and cross-matching advised.";
    if(f.indexOf("large")>-1||f.indexOf("generalised")>-1) return "Abdominocentesis for fluid analysis — cytology, protein, culture recommended.";
    if(f.indexOf("fip")>-1) return "FIP RivTas/PCR testing and antiviral therapy (GS-441524) consultation.";
  }
  // Lymph nodes
  if(organId==="ln"){
    if(f.indexOf("lymphoma")>-1||f.indexOf("severely")>-1) return "Fine needle aspirate for cytology and flow cytometry recommended.";
    if(f.indexOf("metastatic")>-1) return "Primary tumour identification and oncology staging recommended.";
  }
  return "";
}

// ── CURRENT MODE ──────────────────────────────────────────────
var MODE=""; // "usg" or "echo"
var CUR_OR=[]; // active organ array

function setMode(m){
  MODE=m;
  CUR_OR=(m==="echo")?ECHO_OR:OR;
  // Reset data
  D={};
  for(var i=0;i<CUR_OR.length;i++) D[CUR_OR[i].id]={};
  cur=0;
  // Update UI
  document.getElementById("mode-screen").style.display="none";
  document.getElementById("main-content").style.display="block";
  document.getElementById("gen-btn").style.display="flex";
  var sub=document.getElementById("mode-sub");
  if(sub) sub.textContent=(m==="echo")?"Echocardiography · Canine & Feline":"Abdominal Ultrasonography · Canine & Feline";
  // Set date
  document.getElementById("pt-date").valueAsDate=new Date();
  tabs();
  render();
}

function resetAll(){
  D={};
  if(CUR_OR.length>0) for(var i=0;i<CUR_OR.length;i++) D[CUR_OR[i].id]={};
  cur=0;
  // Show mode screen
  document.getElementById("mode-screen").style.display="flex";
  document.getElementById("main-content").style.display="none";
  document.getElementById("gen-btn").style.display="none";
  document.getElementById("tabs-bar").innerHTML="";
  document.getElementById("opanel").innerHTML="";
  // Clear patient fields
  var ids=["pt-name","pt-breed","pt-age","pt-owner","pt-contact","pt-ref","pt-mach","pt-probe","pt-case","pt-complaint","pt-wt"];
  for(var i=0;i<ids.length;i++){var el=document.getElementById(ids[i]);if(el)el.value="";}
}

// Override tabs() to use CUR_OR
function tabs(){
  if(!CUR_OR||!CUR_OR.length) return;
  var h="";
  for(var i=0;i<CUR_OR.length;i++){
    var o=CUR_OR[i];
    var cls="t"+(i===cur?" on":"")+(D[o.id]&&D[o.id]._done?" ok":"");
    h+='<div class="'+cls+'" onclick="go('+i+')">'+o.ic+' '+o.lb+(D[o.id]&&D[o.id]._done?' v':'')+' </div>';
  }
  document.getElementById("tabs-bar").innerHTML=h;
  setTimeout(function(){var el=document.querySelectorAll(".t")[cur];if(el)el.scrollIntoView({inline:"center",behavior:"smooth"});},50);
}

// Override go/save/done/clr/render to use CUR_OR
function go(i){save();cur=i;tabs();render();document.getElementById("body").scrollTop=0;}
function done(){save();D[CUR_OR[cur].id]._done=true;if(cur<CUR_OR.length-1)cur++;tabs();render();document.getElementById("body").scrollTo(0,0);}
function clr(){D[CUR_OR[cur].id]={};render();}

function save(){
  if(!CUR_OR||!CUR_OR.length) return;
  var o=CUR_OR[cur];
  for(var i=0;i<o.ps.length;i++){
    var el=document.getElementById("f"+o.id+o.ps[i].id);
    if(el) D[o.id][o.ps[i].id]=el.value;
  }
}

function render(){
  if(!CUR_OR||!CUR_OR.length) return;
  var o=CUR_OR[cur];
  var sv=D[o.id]||{};
  var nv=sv._viz==="Not Visualised";
  var h='<div class="card"><div class="oh">';
  h+='<div class="oi">'+o.ic+'</div>';
  h+='<div style="flex:1"><div class="olb">'+o.lb+'</div><div class="osb">Tap fields to record findings</div></div>';
  if(MODE==="usg"){
    h+='<div class="vrow">';
    h+='<button class="vb'+(nv?'':" on")+'" onclick="vizV()">Vis</button>';
    h+='<button class="vb nb'+(nv?" on":'')+'" onclick="vizN()">NV</button>';
    h+='</div>';
  }
  h+='</div>';
  if(nv){
    h+='<div class="nv-msg">Not Visualised &mdash; organ not assessable</div>';
  } else {
    h+='<div class="fg">';
    for(var i=0;i<o.ps.length;i++) h+=field(o.id,o.ps[i],sv);
    h+='</div>';
  }
  h+='<div class="brow">';
  if(cur>0) h+='<button class="btn bs" onclick="go('+(cur-1)+')">Back</button>';
  h+='<button class="btn bs" onclick="clr()">Clear</button>';
  h+='<button class="btn bp" onclick="done()">Save &amp; Next</button>';
  h+='</div></div>';
  document.getElementById("opanel").innerHTML=h;
}

// Show mode screen on load
document.getElementById("mode-screen").style.display="flex";
document.getElementById("main-content").style.display="none";
document.getElementById("gen-btn").style.display="none";

</script>

if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    for(var i=0;i<regs.length;i++) regs[i].unregister();
  });
}
</script>
